{% set version = "2.0.5.20260408" %}

package:
  name: types-first
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/types-first/types_first-{{ version }}.tar.gz
  sha256: 9a9e78fa829a17d2f84310f36597d0eb51b3c5e48a3fa39e8f8521948f159c79

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - test -f $SP_DIR/first-stubs/__init__.pyi

about:
  home: https://github.com/python/typeshed
  summary: Typing stubs for first
  license: Apache-2.0 AND MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fhoehle
    - conda-forge/mypy
